<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lumen Study</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffe27a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Study</h1>
          <p class="tag">your learning library</p>
        </div>
      </div>
      <div class="stats">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">saved</span>
      </div>
    </header>

    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search" placeholder="Search summaries, flashcards, notes…" />
      </div>
      <div class="filters" id="filters">
        <button class="chip active" data-mode="all">All</button>
        <button class="chip" data-mode="tldr">TL;DR</button>
        <button class="chip" data-mode="short">Short</button>
        <button class="chip" data-mode="detailed">Detailed</button>
        <button class="chip" data-mode="keypoints">Key points</button>
        <button class="chip" data-mode="eli12">ELI12</button>
        <button class="chip" data-mode="flashcards">Cards</button>
      </div>
    </div>

    <main class="content" id="content">
      <div class="empty" id="empty">
        <div class="empty-illustration">
          <svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="#c65d2e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <h2>Nothing saved yet</h2>
        <p>Select any text on a page, tap <em>Study</em>, then hit the bookmark to save it here.</p>
      </div>
    </main>

    <footer class="footer">
      <div class="hint">
        <kbd>⌘</kbd><kbd>⇧</kbd><kbd>S</kbd>
        <span>to summarize selection</span>
      </div>
      <div class="footer-actions">
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button class="export-btn" id="exportBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
      </div>
    </footer>

    <!-- Detail modal -->
    <div class="modal" id="modal" style="display:none">
      <div class="modal-content">
        <div class="modal-head">
          <div class="modal-title" id="modalTitle">Summary</div>
          <button class="icon-btn" id="modalClose">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot">
          <a class="source-link" id="modalSource" target="_blank">View source</a>
          <button class="delete-btn" id="modalDelete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
